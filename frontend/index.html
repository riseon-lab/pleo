<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pleo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23111111'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23F9F9FB' font-family='Helvetica'>P</text></svg>">
</head>
<body>
  <!-- Boot / auth gate -->
  <div id="boot" class="boot">
    <div class="boot-card">
      <div class="brand-mark">Pleo</div>
      <div id="boot-body"><div class="spinner-wrap"><div class="spinner"></div><span class="muted">Starting…</span></div></div>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app" hidden>
    <nav id="sidebar" class="sidebar">
      <div class="side-brand">
        <span class="brand-mark small">Pleo</span>
        <button id="collapse-btn" class="icon-btn side-collapse" aria-label="Collapse sidebar">⟨</button>
      </div>
      <div class="side-nav" id="side-nav"></div>
      <div class="side-foot" id="side-foot"></div>
    </nav>
    <main id="view" class="view"></main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
